<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杯柄大师版 v1.7 完整报告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #0b1120; color: #e2e8f0; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 50%, #1e1b4b 100%); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(71, 85, 105, 0.3); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.3); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.5); border-radius: 3px; }
        .sort-btn { cursor: pointer; user-select: none; transition: color 0.2s; }
        .sort-btn:hover { color: #60a5fa; }
        .sort-active { color: #60a5fa; }
    </style>
</head>
<body class="min-h-screen gradient-bg">
    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- 头部 -->
        <div class="flex items-center gap-4 mb-6">
            <a href="dashboard.html" class="p-2 hover:bg-slate-700 rounded-lg">
                <i class="fas fa-arrow-left text-slate-400"></i>
            </a>
            <h1 class="text-2xl font-bold text-white">杯柄大师版 v1.7 完整报告</h1>
            <span class="px-2 py-1 bg-yellow-500/20 text-yellow-400 rounded text-sm">195信号</span>
        </div>

        <!-- 核心指标 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="glass-card rounded-xl p-6">
                <div class="text-sm text-slate-400 mb-1">总信号</div>
                <div class="text-3xl font-bold text-white" id="totalCount">--</div>
                <div class="text-xs text-green-400">✅ 达标</div>
            </div>
            <div class="glass-card rounded-xl p-6">
                <div class="text-sm text-slate-400 mb-1">胜率</div>
                <div class="text-3xl font-bold text-green-400">40.5%</div>
                <div class="text-xs text-slate-500">79胜116负</div>
            </div>
            <div class="glass-card rounded-xl p-6">
                <div class="text-sm text-slate-400 mb-1">平均收益</div>
                <div class="text-3xl font-bold text-green-400">+1.27%</div>
                <div class="text-xs text-slate-500">20天持有</div>
            </div>
            <div class="glass-card rounded-xl p-6">
                <div class="text-sm text-slate-400 mb-1">最大盈利</div>
                <div class="text-3xl font-bold text-yellow-400">+103.55%</div>
                <div class="text-xs text-slate-500">超捷股份</div>
            </div>
        </div>

        <!-- 收益分布 -->
        <div class="glass-card rounded-xl p-6 mb-6">
            <h2 class="font-semibold text-white mb-4"><i class="fas fa-chart-bar mr-2 text-blue-400"></i>收益率分布</h2>
            <div class="grid grid-cols-5 gap-2 text-center">
                <div class="p-3 bg-red-500/20 rounded">
                    <div class="text-red-400 font-bold">≤-10%</div>
                    <div class="text-slate-400 text-xs">28个</div>
                </div>
                <div class="p-3 bg-red-400/20 rounded">
                    <div class="text-red-300 font-bold">-10~-5%</div>
                    <div class="text-slate-400 text-xs">35个</div>
                </div>
                <div class="p-3 bg-slate-700/50 rounded">
                    <div class="text-slate-300 font-bold">-5~0%</div>
                    <div class="text-slate-400 text-xs">53个</div>
                </div>
                <div class="p-3 bg-green-400/20 rounded">
                    <div class="text-green-300 font-bold">0~10%</div>
                    <div class="text-slate-400 text-xs">58个</div>
                </div>
                <div class="p-3 bg-green-500/20 rounded">
                    <div class="text-green-400 font-bold">>10%</div>
                    <div class="text-slate-400 text-xs">21个</div>
                </div>
            </div>
        </div>

        <!-- 完整信号列表 -->
        <div class="glass-card rounded-xl p-6">
            <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
                <h2 class="font-semibold text-white"><i class="fas fa-list mr-2 text-purple-400"></i>完整信号列表</h2>
                <div class="flex gap-2">
                    <input type="text" id="searchInput" placeholder="搜索股票..." 
                           class="px-3 py-1 bg-slate-800 border border-slate-700 rounded text-sm text-white focus:outline-none focus:border-blue-500">
                    <select id="filterType" class="px-3 py-1 bg-slate-800 border border-slate-700 rounded text-sm text-white">
                        <option value="all">全部</option>
                        <option value="确认">确认</option>
                        <option value="预警">预警</option>
                    </select>
                </div>
            </div>
            
            <div class="overflow-x-auto max-h-96 custom-scrollbar">
                <table class="w-full text-sm">
                    <thead class="sticky top-0 bg-slate-800">
                        <tr class="text-slate-400 border-b border-slate-700">
                            <th class="text-left py-3 px-2 sort-btn" onclick="sortTable('rank')">排名 <i class="fas fa-sort"></i></th>
                            <th class="text-left px-2">股票</th>
                            <th class="text-left px-2 sort-btn" onclick="sortTable('date')">日期 <i class="fas fa-sort"></i></th>
                            <th class="text-left px-2">类型</th>
                            <th class="text-right px-2">买入</th>
                            <th class="text-right px-2">卖出</th>
                            <th class="text-right px-2 sort-btn sort-active" onclick="sortTable('return')">收益率 <i class="fas fa-sort-down"></i></th>
                            <th class="text-right px-2">最大收益</th>
                        </tr>
                    </thead>
                    <tbody id="signalTable" class="text-slate-300">
                        <tr><td colspan="8" class="py-4 text-center text-slate-500">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="mt-4 flex justify-between items-center">
                <div class="text-sm text-slate-400">
                    显示 <span id="showingCount">0</span> / <span id="totalSignals">195</span> 条
                </div>
                <div class="flex gap-2">
                    <button onclick="prevPage()" id="prevBtn" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm disabled:opacity-50">上一页</button>
                    <span id="pageInfo" class="px-3 py-1 text-sm text-slate-400">1/10</span>
                    <button onclick="nextPage()" id="nextBtn" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm disabled:opacity-50">下一页</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data/all_signals.js"></script>
    <script>
        // 等待数据加载
        let currentPage = 1;
        const pageSize = 20;
        let filteredSignals = [];
        let currentSort = { key: 'return', desc: true };

        function init() {
            // 检查数据是否加载
            if (typeof allSignals === 'undefined' || !allSignals || allSignals.length === 0) {
                document.getElementById('signalTable').innerHTML = '<tr><td colspan="8" class="py-4 text-center text-red-400">数据加载失败，请刷新页面</td></tr>';
                return;
            }

            // 按收益率排序（默认）
            allSignals.sort((a, b) => b.return - a.return);
            
            // 重新分配排名
            allSignals.forEach((s, i) => s.rank = i + 1);
            
            filteredSignals = [...allSignals];
            
            document.getElementById('totalCount').textContent = allSignals.length;
            document.getElementById('totalSignals').textContent = allSignals.length;
            
            renderTable();
            setupEventListeners();
        }

        function renderTable() {
            const tbody = document.getElementById('signalTable');
            const start = (currentPage - 1) * pageSize;
            const end = Math.min(start + pageSize, filteredSignals.length);
            const pageData = filteredSignals.slice(start, end);

            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="py-4 text-center text-slate-500">无数据</td></tr>';
                return;
            }

            tbody.innerHTML = pageData.map(s => `
                <tr class="border-b border-slate-800 hover:bg-slate-800/50">
                    <td class="py-2 px-2">${s.rank <= 3 ? `<span class="text-yellow-400 font-bold">${s.rank}</span>` : s.rank}</td>
                    <td class="px-2">
                        <div class="font-medium">${s.name}</div>
                        <div class="text-xs text-slate-500">${s.ts_code}</div>
                    </td>
                    <td class="px-2">${s.date}</td>
                    <td class="px-2"><span class="${s.type === '确认' ? 'text-green-400' : 'text-blue-400'}">${s.type}</span></td>
                    <td class="text-right px-2">${s.entry.toFixed(2)}</td>
                    <td class="text-right px-2">${s.exit.toFixed(2)}</td>
                    <td class="text-right px-2 ${s.return > 0 ? 'text-green-400' : 'text-red-400'} font-medium">${s.return > 0 ? '+' : ''}${s.return.toFixed(2)}%</td>
                    <td class="text-right px-2 text-slate-400">${s.max_return > 0 ? '+' : ''}${s.max_return.toFixed(2)}%</td>
                </tr>
            `).join('');

            document.getElementById('showingCount').textContent = pageData.length;
            const totalPages = Math.ceil(filteredSignals.length / pageSize);
            document.getElementById('pageInfo').textContent = `${currentPage}/${totalPages}`;
            
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(filteredSignals.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        }

        function sortTable(key) {
            // 切换排序方向
            if (currentSort.key === key) {
                currentSort.desc = !currentSort.desc;
            } else {
                currentSort.key = key;
                currentSort.desc = true;
            }

            // 排序
            filteredSignals.sort((a, b) => {
                let valA = a[key];
                let valB = b[key];
                
                // 字符串比较
                if (typeof valA === 'string') {
                    valA = valA.toLowerCase();
                    valB = valB.toLowerCase();
                }
                
                if (valA < valB) return currentSort.desc ? 1 : -1;
                if (valA > valB) return currentSort.desc ? -1 : 1;
                return 0;
            });

            // 重新分配排名
            filteredSignals.forEach((s, i) => s.rank = i + 1);
            
            currentPage = 1;
            renderTable();
            updateSortIcons(key);
        }

        function updateSortIcons(activeKey) {
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.remove('sort-active');
                const icon = btn.querySelector('i');
                if (icon) icon.className = 'fas fa-sort';
            });
            
            const activeBtn = document.querySelector(`th[onclick="sortTable('${activeKey}')"]`);
            if (activeBtn) {
                activeBtn.classList.add('sort-active');
                const icon = activeBtn.querySelector('i');
                if (icon) icon.className = currentSort.desc ? 'fas fa-sort-down' : 'fas fa-sort-up';
            }
        }

        function setupEventListeners() {
            // 搜索
            document.getElementById('searchInput').addEventListener('input', function(e) {
                const term = e.target.value.toLowerCase().trim();
                if (term === '') {
                    filteredSignals = [...allSignals];
                } else {
                    filteredSignals = allSignals.filter(s => 
                        s.name.toLowerCase().includes(term) || 
                        s.ts_code.toLowerCase().includes(term)
                    );
                }
                // 保持当前排序
                sortTable(currentSort.key);
                currentPage = 1;
                renderTable();
            });

            // 筛选
            document.getElementById('filterType').addEventListener('change', function(e) {
                const type = e.target.value;
                if (type === 'all') {
                    filteredSignals = [...allSignals];
                } else {
                    filteredSignals = allSignals.filter(s => s.type === type);
                }
                // 保持当前排序
                sortTable(currentSort.key);
                currentPage = 1;
                renderTable();
            });
        }

        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
