<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趋势分析回测结果 - OpenClaw Lens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
        .gradient-text { background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, BarChart, Bar } = Recharts;

        // 模拟数据 - 实际应从JSON文件加载
        const mockData = {
            version: "v6.5.1",
            date: "2026-03-20",
            totalSignals: 598,
            winRate: 48.2,
            avgReturn: 3.40,
            sharpeRatio: 0.29,
            maxProfit: 50.7,
            maxLoss: -35.8,
            avgHoldDays: 13.6
        };

        const App = () => {
            const [data, setData] = useState(mockData);

            return (
                <div className="min-h-screen bg-slate-900">
                    {/* Header */}
                    <header className="bg-slate-800/50 backdrop-blur-xl border-b border-slate-700 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <h1 className="text-2xl font-bold gradient-text">
                                    📊 OpenClaw Lens
                                </h1>
                                <div className="text-sm text-slate-400">
                                    趋势分析回测结果可视化
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* Version Info */}
                        <div className="mb-8">
                            <h2 className="text-3xl font-bold mb-2">
                                杯柄策略 {data.version}
                            </h2>
                            <p className="text-slate-400">
                                回测日期: {data.date} | 股票范围: 全市场 5490 只
                            </p>
                        </div>

                        {/* Key Metrics */}
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
                            <MetricCard 
                                title="总信号" 
                                value={data.totalSignals} 
                                unit="个"
                                color="blue"
                            />
                            <MetricCard 
                                title="胜率" 
                                value={data.winRate} 
                                unit="%"
                                color={data.winRate >= 55 ? "green" : "yellow"}
                            />
                            <MetricCard 
                                title="平均收益" 
                                value={data.avgReturn} 
                                unit="%"
                                color="green"
                            />
                            <MetricCard 
                                title="夏普比率" 
                                value={data.sharpeRatio} 
                                color={data.sharpeRatio >= 0.55 ? "green" : "yellow"}
                            />
                            <MetricCard 
                                title="最大盈利" 
                                value={data.maxProfit} 
                                unit="%"
                                color="green"
                            />
                            <MetricCard 
                                title="最大亏损" 
                                value={data.maxLoss} 
                                unit="%"
                                color={data.maxLoss >= -20 ? "green" : "red"}
                            />
                        </div>

                        {/* Analysis */}
                        <div className="bg-slate-800/50 rounded-2xl p-6 border border-slate-700">
                            <h3 className="text-xl font-semibold mb-4">📈 结果分析</h3>
                            <div className="space-y-3 text-slate-300">
                                <p>
                                    <strong className="text-white">信号数量:</strong> 
                                    {' '}{data.totalSignals} 个，较 v6.5 (221个) 提升 {((data.totalSignals/221-1)*100).toFixed(0)}%
                                </p>
                                <p>
                                    <strong className="text-white">胜率:</strong> 
                                    {' '}{data.winRate}% {' '}
                                    {data.winRate >= 55 ? 
                                        <span className="text-green-400">✅ 达标</span> : 
                                        <span className="text-yellow-400">⚠️ 未达标 (目标≥55%)</span>
                                    }
                                </p>
                                <p>
                                    <strong className="text-white">收益表现:</strong> 
                                    {' '}平均收益 {data.avgReturn}%，表现良好
                                </p>
                                <p>
                                    <strong className="text-white">结论:</strong> 
                                    {' '}参数放宽后信号增多但质量下降，需要在信号数量和胜率间找平衡。
                                </p>
                            </div>
                        </div>

                        {/* Footer */}
                        <footer className="mt-12 text-center text-slate-500 text-sm">
                            <p>OpenClaw Lens - 趋势分析回测可视化</p>
                            <p className="mt-1">数据更新时间: {new Date().toLocaleString('zh-CN')}</p>
                        </footer>
                    </main>
                </div>
            );
        };

        const MetricCard = ({ title, value, unit = "", color = "blue" }) => {
            const colorClasses = {
                blue: "from-blue-500/20 to-blue-600/20 border-blue-500/30",
                green: "from-green-500/20 to-green-600/20 border-green-500/30",
                yellow: "from-yellow-500/20 to-yellow-600/20 border-yellow-500/30",
                red: "from-red-500/20 to-red-600/20 border-red-500/30"
            };

            return (
                <div className={`bg-gradient-to-br ${colorClasses[color]} rounded-xl p-4 border`}>
                    <div className="text-slate-400 text-sm mb-1">{title}</div>
                    <div className="text-2xl font-bold text-white">
                        {value}{unit}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
